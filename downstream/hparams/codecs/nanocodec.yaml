experiment_name: nanocodec

# Codec parameters
num_codebooks: 4
vocab_size: 4096
embedding_dim: 16
model_name: nvidia/nemo-nano-codec-22khz-0.6kbps-12.5fps

# Codec
codec: !new:audiocodecs.NanoCodec
    sample_rate: !ref <sample_rate>
    num_codebooks: !ref <num_codebooks>
    model_name: !ref <model_name>
    mode: !ref <mode>
