experiment_name: encodec

# Codec parameters
orig_sample_rate: 24000
num_codebooks: 2
vocab_size: 1024
embedding_dim: 128

# Codec
codec: !new:audiocodecs.Encodec
    sample_rate: !ref <sample_rate>
    orig_sample_rate: !ref <orig_sample_rate>
    num_codebooks: !ref <num_codebooks>
    mode: !ref <mode>
